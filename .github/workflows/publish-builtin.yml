name: Publish Builtin

on:
  workflow_dispatch:
    inputs:
      builtin:
        description: "Which builtin under builtins/ to publish"
        required: true
        type: choice
        options:
          - hello-tier1
          - otel-bare-logs
          - otel-bare-metrics
          - otel-bare-spans
      description:
        description: "Package description shown on GHCR"
        required: false
        type: string
        default: "Splicer builtin middleware component"

env:
  # Match publish-wit.yml
  WKG_VERSION: "0.13.0"

  # Media types match the OCI Wasm convention used across the bytecodealliance
  # ecosystem so pull-side tooling (oci-distribution / oci-wasm) recognizes
  # the artifact as a wasm component.
  ARTIFACT_TYPE: "application/vnd.bytecodealliance.wasm.component.v0"
  LAYER_MEDIA_TYPE: "application/wasm"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install build-time tooling
        # wkg + wasm-tools are needed by the Makefile pattern rule (wkg wit
        # fetch + wasm-tools component new). Push doesn't use wkg.
        run: |
          cargo binstall -y "wkg@${{ env.WKG_VERSION }}"
          cargo binstall -y wasm-tools

      - name: Add wasm32-wasip1 target
        run: rustup target add wasm32-wasip1

      - name: Setup oras
        uses: oras-project/setup-oras@v1

      - name: Extract version from Cargo.toml
        id: version
        run: |
          toml="builtins/${{ inputs.builtin }}/Cargo.toml"
          version=$(grep -E '^version = ' "$toml" \
            | head -n 1 \
            | sed -E 's/version = "([^"]+)".*/\1/')
          if [ -z "$version" ]; then
            echo "::error file=$toml::Could not find 'version = \"<x>\"' declaration"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if version already published
        env:
          REF: "ghcr.io/${{ github.repository_owner }}/splicer/builtins/${{ inputs.builtin }}:${{ steps.version.outputs.version }}"
        run: |
          if docker manifest inspect "$REF" >/dev/null 2>&1; then
            echo "::error file=builtins/${{ inputs.builtin }}/Cargo.toml::$REF is already published. Bump the version in Cargo.toml before publishing."
            exit 1
          fi
          echo "$REF not yet published — proceeding."

      - name: Build builtin component
        env:
          # Resolves cross-package WIT `use` clauses against ghcr.io
          # for any wasi:* deps the builtin pulls in.
          WKG_CONFIG_FILE: ${{ github.workspace }}/wkg-registries.toml
        run: |
          make "assets/builtins/${{ inputs.builtin }}.wasm"

      - name: Publish to GitHub Container Registry
        id: publish
        env:
          REF: "ghcr.io/${{ github.repository_owner }}/splicer/builtins/${{ inputs.builtin }}:${{ steps.version.outputs.version }}"
          FILE: "assets/builtins/${{ inputs.builtin }}.wasm"
          DESCRIPTION: ${{ inputs.description }}
          SOURCE_URL: "https://github.com/${{ github.repository }}"
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          json=$(oras push "$REF" \
            --artifact-type "$ARTIFACT_TYPE" \
            "$FILE:$LAYER_MEDIA_TYPE" \
            --annotation "org.opencontainers.image.description=$DESCRIPTION" \
            --annotation "org.opencontainers.image.source=$SOURCE_URL" \
            --annotation "org.opencontainers.image.url=$SOURCE_URL" \
            --annotation "org.opencontainers.image.version=$VERSION" \
            --annotation "org.opencontainers.image.licenses=Apache-2.0" \
            --format json)
          digest=$(echo "$json" | jq -r '.digest')
          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "::error::oras push did not return a digest. Output was: $json"
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Pushed $REF @ $digest"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/splicer/builtins/${{ inputs.builtin }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true

      - name: Summarize published artifact
        env:
          REF: "ghcr.io/${{ github.repository_owner }}/splicer/builtins/${{ inputs.builtin }}:${{ steps.version.outputs.version }}"
          WEB_URL: "https://github.com/${{ github.repository_owner }}/splicer/pkgs/container/splicer%2Fbuiltins%2F${{ inputs.builtin }}"
          DIGEST: ${{ steps.publish.outputs.digest }}
        run: |
          {
            echo "### Published builtin component"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| OCI reference | \`$REF\` |"
            echo "| Digest | \`$DIGEST\` |"
            echo "| Package page | $WEB_URL |"
            echo ""
            echo "Pull with:"
            echo '```'
            echo "oras pull $REF"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Published $REF"
          echo "See: $WEB_URL"
