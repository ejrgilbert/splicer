name: Publish WIT

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Which WIT package under wit/ to publish"
        required: true
        type: choice
        options:
          - common
          - tier1
      description:
        description: "Package description shown on GHCR"
        required: false
        type: string
        default: "Splicer middleware WIT definitions"

env:
  # Pinned to match consumers. Do not bump without coordinating: newer wkg emits
  # component-model encodings older wkg can't decode, and wkg 0.14+ has stricter
  # name validation that rejects `[async]` externs in wasi:http et al.
  WKG_VERSION: "0.13.0"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install wkg
        run: cargo binstall -y "wkg@${{ env.WKG_VERSION }}"

      - name: Extract version from world.wit
        id: version
        run: |
          wit_file="wit/${{ inputs.tier }}/world.wit"
          version=$(grep -E "^package splicer:${{ inputs.tier }}@" "$wit_file" \
            | sed -E 's/.*@([^;]+);.*/\1/' \
            | head -n 1)
          if [ -z "$version" ]; then
            echo "::error file=$wit_file::Could not find 'package splicer:${{ inputs.tier }}@<version>;' declaration"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if version already published
        env:
          REF: "ghcr.io/${{ github.repository_owner }}/splicer/${{ inputs.tier }}:${{ steps.version.outputs.version }}"
        run: |
          if docker manifest inspect "$REF" >/dev/null 2>&1; then
            echo "::error file=wit/${{ inputs.tier }}/world.wit::$REF is already published. Bump the @version in world.wit before publishing."
            exit 1
          fi
          echo "$REF not yet published — proceeding."

      - name: Build WIT package
        env:
          # Resolves cross-package `use` clauses against ghcr.io.
          # Required for tier1+ (which use splicer:common); no-op for common.
          WKG_CONFIG_FILE: ${{ github.workspace }}/wkg-registries.toml
        run: |
          wkg wit build \
            -o "$GITHUB_WORKSPACE/splicer-${{ inputs.tier }}.wasm" \
            --wit-dir "wit/${{ inputs.tier }}"

      - name: Publish to GitHub Container Registry
        id: publish
        # Pin to commit sha (currently v5). The `wkg` input is now honored
        # (https://github.com/bytecodealliance/wkg-github-action/pull/12)
        # so the action installs the same pinned wkg used to build above.
        uses: bytecodealliance/wkg-github-action@10b3b04b9059ba46208cd7daf7d352af14bded0f
        with:
          wkg: ${{ env.WKG_VERSION }}
          file: splicer-${{ inputs.tier }}.wasm
          oci-reference-without-tag: ghcr.io/${{ github.repository_owner }}/splicer/${{ inputs.tier }}
          version: ${{ steps.version.outputs.version }}
          description: ${{ inputs.description }}
          source: https://github.com/${{ github.repository }}
          homepage: https://github.com/${{ github.repository }}
          licenses: Apache-2.0

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/splicer/${{ inputs.tier }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true

      - name: Summarize published artifact
        env:
          REF: "ghcr.io/${{ github.repository_owner }}/splicer/${{ inputs.tier }}:${{ steps.version.outputs.version }}"
          WEB_URL: "https://github.com/${{ github.repository_owner }}/splicer/pkgs/container/splicer%2F${{ inputs.tier }}"
          DIGEST: ${{ steps.publish.outputs.digest }}
        run: |
          {
            echo "### Published WIT artifact"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| OCI reference | \`$REF\` |"
            echo "| Digest | \`$DIGEST\` |"
            echo "| Package page | $WEB_URL |"
            echo ""
            echo "Pull with:"
            echo '```'
            echo "wkg oci pull $REF"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Published $REF"
          echo "See: $WEB_URL"
