name: Publish WIT

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Which WIT package under wit/ to publish"
        required: true
        type: choice
        options:
          - tier1
      description:
        description: "Package description shown on GHCR"
        required: false
        type: string
        default: "Splicer middleware WIT definitions"

env:
  WKG_VERSION: "0.15.0"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install wkg
        run: cargo binstall -y "wkg@${{ env.WKG_VERSION }}"

      - name: Extract version from world.wit
        id: version
        run: |
          wit_file="wit/${{ inputs.tier }}/world.wit"
          version=$(grep -E "^package splicer:${{ inputs.tier }}@" "$wit_file" \
            | sed -E 's/.*@([^;]+);.*/\1/' \
            | head -n 1)
          if [ -z "$version" ]; then
            echo "::error file=$wit_file::Could not find 'package splicer:${{ inputs.tier }}@<version>;' declaration"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if version already published
        env:
          REF: "ghcr.io/${{ github.repository_owner }}/splicer/${{ inputs.tier }}:${{ steps.version.outputs.version }}"
        run: |
          if docker manifest inspect "$REF" >/dev/null 2>&1; then
            echo "::error file=wit/${{ inputs.tier }}/world.wit::$REF is already published. Bump the @version in world.wit before publishing."
            exit 1
          fi
          echo "$REF not yet published — proceeding."

      - name: Build WIT package
        run: |
          wkg wit build \
            -o "$GITHUB_WORKSPACE/splicer-${{ inputs.tier }}.wasm" \
            --wit-dir "wit/${{ inputs.tier }}"

      - name: Publish to GitHub Container Registry
        id: publish
        uses: bytecodealliance/wkg-github-action@v5
        with:
          oci-reference-without-tag: "ghcr.io/${{ github.repository_owner }}/splicer/${{ inputs.tier }}"
          file: "splicer-${{ inputs.tier }}.wasm"
          description: ${{ inputs.description }}
          source: "https://github.com/${{ github.repository }}"
          homepage: "https://github.com/${{ github.repository }}"
          version: ${{ steps.version.outputs.version }}
          licenses: "Apache-2.0"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/splicer/${{ inputs.tier }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
