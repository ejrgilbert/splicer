name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Nightly at 07:00 UTC — triggers the heavy fuzz job below.
    - cron: "0 7 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format + Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Caching to increase performance as dependency tree grows
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  # Run CLI across OS targets
  build_and_test:
    name: Build + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Caching per OS
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked --verbose

      - name: Run tests
        run: cargo test --locked --all-features --verbose --all-targets

  # Integration tests using the component-interposition submodule.
  # Runs the full splicer + wac + wasmtime pipeline against real components.
  integration:
   name: Integration Tests
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
       with:
         submodules: recursive
     - uses: dtolnay/rust-toolchain@stable
     - uses: Swatinem/rust-cache@v2
     - name: Install tools
       run: |
         cargo install wac-cli@0.9.0 wasm-tools@1.244.0
         cargo install splicer@2.0.0-rc3 cviz@2.0.0-rc3
     - name: Run integration tests
       run: cargo test --test integration -- --ignored

  # End-to-end fuzz + run harness (tests/fuzz_and_run.rs). Scaffolds
  # provider/consumer/middleware crates in a tempdir, drives both the
  # canned catalog and the `arbitrary`-generated fuzz cases through the
  # full splicer pipeline (compose + splice for both `between` and
  # `before` rules), and invokes the output under wasmtime. CI runs at
  # heavier iter/depth than the local default to catch regressions
  # before they land.
  fuzz_and_run:
   name: Fuzz + Run (thorough)
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
       with:
         submodules: recursive
     - uses: dtolnay/rust-toolchain@stable
       with:
         targets: wasm32-wasip1
     - uses: Swatinem/rust-cache@v2
     - name: Install tools
       run: cargo install wac-cli@0.9.0 wasm-tools@1.244.0
     - name: Canned shape catalog
       run: cargo test --test fuzz_and_run -- --ignored --nocapture test_canned
     - name: Fuzz (50 iters, depth 5)
       env:
         SPLICER_FUZZ_ITERS: "50"
         SPLICER_FUZZ_DEPTH: "5"
       run: cargo test --test fuzz_and_run -- --ignored --nocapture test_fuzz

  # Heavier fuzz run on a schedule — catches bugs that only surface
  # with more random shapes or deeper nesting than PR CI exercises.
  # Each iter rebuilds a tempdir workspace, so this job takes longer
  # than the PR-gated one; acceptable since it runs off-hours.
  fuzz_nightly:
   name: Fuzz + Run (nightly, heavy)
   runs-on: ubuntu-latest
   if: github.event_name == 'schedule'
   steps:
     - uses: actions/checkout@v4
       with:
         submodules: recursive
     - uses: dtolnay/rust-toolchain@stable
       with:
         targets: wasm32-wasip1
     - uses: Swatinem/rust-cache@v2
     - name: Install tools
       run: cargo install wac-cli@0.9.0 wasm-tools@1.244.0
     - name: Fuzz (200 iters, depth 6)
       env:
         SPLICER_FUZZ_ITERS: "200"
         SPLICER_FUZZ_DEPTH: "6"
       run: cargo test --test fuzz_and_run -- --ignored --nocapture test_fuzz
