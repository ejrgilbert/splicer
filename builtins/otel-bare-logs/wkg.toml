# Resolve splicer:* WIT packages from this repo's canonical wit/ dirs
# instead of pulling from ghcr.io. Keeps the builtin's source build
# offline-friendly and tracking the in-repo WIT exactly. wasi:* packages
# (including wasi:otel@0.2.0-rc.2) resolve from ghcr.io via wkg's
# default WebAssembly-org namespace mapping.
[overrides]
"splicer:tier1" = { path = "../../wit/tier1" }
"splicer:common" = { path = "../../wit/common" }
